<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dede Suparman — Links</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
:root {
  --bg: #0a0a0f;--surface: #111118;--card: #18181f;--card-hover: #1e1e27;
  --border: rgba(255,255,255,0.06);--border-hover: rgba(120,80,255,0.4);
  --accent: #7c4dff;--accent2: #00e5ff;--accent3: #ff4081;
  --text: #f0f0f8;--muted: #8888aa;--dim: #444455;--r: 14px;--rs: 8px;
}
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
body::before{content:'';position:fixed;width:600px;height:600px;top:-200px;left:-200px;background:radial-gradient(circle,rgba(124,77,255,0.12) 0%,transparent 70%);pointer-events:none;z-index:0}
body::after{content:'';position:fixed;width:500px;height:500px;bottom:-150px;right:-150px;background:radial-gradient(circle,rgba(0,229,255,0.07) 0%,transparent 70%);pointer-events:none;z-index:0}
.wrap{max-width:860px;margin:0 auto;padding:0 20px;position:relative;z-index:1}
.hero{padding:60px 0 40px;text-align:center}
.avatar-ring{width:96px;height:96px;margin:0 auto 20px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--accent2));padding:3px}
.avatar-inner{width:100%;height:100%;border-radius:50%;overflow:hidden;background:var(--surface);display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-size:28px;font-weight:800;color:var(--text)}
.avatar-inner img{width:100%;height:100%;object-fit:cover;object-position:center top}
.hero-name{font-family:'Syne',sans-serif;font-size:32px;font-weight:800;letter-spacing:-1px;background:linear-gradient(120deg,#fff 40%,var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.hero-bio{color:var(--muted);font-size:15px;margin-top:8px;line-height:1.6}
.admin-link{display:inline-block;margin-top:16px;padding:8px 20px;border:1px solid var(--dim);border-radius:50px;color:var(--muted);font-size:12px;text-decoration:none;transition:.2s;letter-spacing:.5px}
.admin-link:hover{border-color:var(--accent);color:var(--accent)}
.search-wrap{margin:0 0 32px;position:relative}
.search-wrap i{position:absolute;left:16px;top:50%;transform:translateY(-50%);color:var(--dim);font-size:14px}
.search-input{width:100%;padding:14px 16px 14px 44px;background:var(--card);border:1px solid var(--border);border-radius:50px;color:var(--text);font-size:14px;font-family:'DM Sans',sans-serif;transition:.2s}
.search-input:focus{outline:none;border-color:var(--accent);background:var(--card-hover)}
.search-input::placeholder{color:var(--dim)}
.pills{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:28px}
.pill{padding:7px 16px;border-radius:50px;border:1px solid var(--border);background:var(--card);color:var(--muted);font-size:12px;font-weight:500;cursor:pointer;transition:.2s;white-space:nowrap;font-family:'DM Sans',sans-serif}
.pill:hover{border-color:var(--accent);color:var(--accent)}
.pill.active{background:var(--accent);border-color:var(--accent);color:#fff}
.cat-block{margin-bottom:36px}
.cat-label{display:flex;align-items:center;gap:10px;font-family:'Syne',sans-serif;font-size:13px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:14px;padding-bottom:10px;border-bottom:1px solid var(--border)}
.cat-label i{font-size:14px}
.cat-label .badge{margin-left:auto;background:rgba(255,255,255,0.05);color:var(--dim);font-size:10px;padding:3px 10px;border-radius:50px;letter-spacing:1px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:10px}
.lcard{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:16px;display:flex;align-items:center;gap:14px;cursor:pointer;transition:.25s;text-decoration:none;color:inherit;position:relative;overflow:hidden}
.lcard::before{content:'';position:absolute;top:0;left:0;width:100%;height:100%;background:linear-gradient(135deg,rgba(124,77,255,0.05),transparent);opacity:0;transition:.25s}
.lcard:hover{border-color:var(--border-hover);transform:translateY(-2px);background:var(--card-hover)}
.lcard:hover::before{opacity:1}
.icon-box{width:44px;height:44px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;border:1px solid rgba(255,255,255,0.07)}
.lcard-info{flex:1;min-width:0}
.lcard-title{font-size:14px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.lcard-url{font-size:11px;color:var(--dim);margin-top:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.lcard-tags{display:flex;gap:4px;flex-wrap:wrap;margin-top:6px}
.tag{font-size:10px;padding:2px 8px;border-radius:50px;background:rgba(124,77,255,0.1);color:rgba(124,77,255,0.9);border:1px solid rgba(124,77,255,0.15)}
.lcard-ext{font-size:11px;color:var(--dim);flex-shrink:0}
.empty{text-align:center;padding:80px 20px;display:none}
.empty.show{display:block}
.empty i{font-size:48px;color:var(--dim);display:block;margin-bottom:12px}
.empty p{color:var(--muted);font-size:14px}
.loading{text-align:center;padding:60px;color:var(--muted);font-size:14px}
.loading i{font-size:32px;display:block;margin-bottom:12px;color:var(--accent);animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
footer{text-align:center;padding:40px 0 60px;color:var(--dim);font-size:12px;border-top:1px solid var(--border);margin-top:20px}
footer a{color:var(--accent);text-decoration:none}
@media(max-width:600px){.hero{padding:40px 0 28px}.hero-name{font-size:26px}.grid{grid-template-columns:1fr}}
</style>
</head>

<script>
const SUPABASE_URL='https://wtyqtdacjqpvwusbdntr.supabase.co';
const SUPABASE_KEY='sb_publishable_A2OJ78u2hiATRW-A9vdVhA_C5AGe8Um';

async function sbGet(table,params=''){
  const r=await fetch(`${SUPABASE_URL}/rest/v1/${table}?${params}`,{headers:{'apikey':SUPABASE_KEY,'Authorization':'Bearer '+SUPABASE_KEY}});
  if(!r.ok)throw new Error(await r.text());
  return r.json();
}

const CAT_CONFIG={
  work:{label:'Work',icon:'fa-briefcase',color:'#6366f1'},
  social:{label:'Social',icon:'fa-comments',color:'#3b82f6'},
  dev:{label:'Development',icon:'fa-code',color:'#10b981'},
  design:{label:'Design',icon:'fa-palette',color:'#f43f5e'},
  learning:{label:'Learning',icon:'fa-book-open',color:'#f97316'},
  tools:{label:'Tools',icon:'fa-wrench',color:'#a855f7'},
  media:{label:'Media',icon:'fa-play',color:'#ec4899'},
  finance:{label:'Finance',icon:'fa-coins',color:'#eab308'},
  health:{label:'Health',icon:'fa-heart-pulse',color:'#ef4444'},
  other:{label:'Other',icon:'fa-thumbtack',color:'#6b7280'}
};

function hexToRgba(hex,a){
  try{const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);return `rgba(${r},${g},${b},${a})`}catch{return `rgba(124,77,255,${a})`}
}
function getDomain(url){try{return new URL(url).hostname.replace('www.','')}catch{return url}}
function esc(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML}

let allLinks=[];
let filter='all',search='';

async function init(){
  try{
    // Load profile
    const profiles=await sbGet('profiles','select=*&limit=1');
    if(profiles.length){
      const p=profiles[0];
      document.getElementById('heroName').textContent=p.name||'Dede Suparman';
      document.getElementById('heroBio').textContent=p.bio||'Digital workspace';
      document.title=(p.name||'Dede Suparman')+' — Links';
    }
    // Load links
    allLinks=await sbGet('links','select=*&order=created_at.desc');
    renderPills();
    render();
  }catch(e){
    console.error(e);
    document.getElementById('linksOut').innerHTML='<div class="loading"><i class="fas fa-exclamation-circle" style="animation:none;color:var(--accent3)"></i><p style="color:var(--muted)">Failed to load. Check Supabase setup.</p></div>';
  }
}

function renderPills(){
  const cats=[...new Set(allLinks.map(l=>l.category))];
  const pillsEl=document.getElementById('pills');
  pillsEl.innerHTML=`<div class="pill active" data-cat="all" onclick="setFilter('all',this)">All (${allLinks.length})</div>`;
  cats.forEach(cat=>{
    const cfg=CAT_CONFIG[cat]||CAT_CONFIG.other;
    const count=allLinks.filter(l=>l.category===cat).length;
    const p=document.createElement('div');
    p.className='pill'+(filter===cat?' active':'');
    p.dataset.cat=cat;
    p.onclick=function(){setFilter(cat,this)};
    p.innerHTML=`<i class="fas ${cfg.icon}" style="margin-right:5px;font-size:11px"></i>${cfg.label} (${count})`;
    pillsEl.appendChild(p);
  });
}

function setFilter(cat,el){
  filter=cat;
  document.querySelectorAll('.pill').forEach(p=>p.classList.remove('active'));
  el.classList.add('active');
  render();
}

function render(){
  let links=[...allLinks];
  if(filter!=='all')links=links.filter(l=>l.category===filter);
  if(search){const q=search.toLowerCase();links=links.filter(l=>l.title.toLowerCase().includes(q)||l.url.toLowerCase().includes(q)||(l.tags&&l.tags.some(t=>t.toLowerCase().includes(q))))}
  const out=document.getElementById('linksOut');
  const empty=document.getElementById('emptyState');
  if(!links.length){out.innerHTML='';empty.classList.add('show');return}
  empty.classList.remove('show');
  const grouped={};
  links.forEach(l=>{if(!grouped[l.category])grouped[l.category]=[];grouped[l.category].push(l)});
  const order=['work','social','dev','design','learning','tools','media','finance','health','other'];
  const keys=Object.keys(grouped).sort((a,b)=>{const ai=order.indexOf(a),bi=order.indexOf(b);return ai===-1?1:bi===-1?-1:ai-bi});
  let html='';
  keys.forEach(cat=>{
    const cfg=CAT_CONFIG[cat]||CAT_CONFIG.other;
    const catLinks=grouped[cat];
    html+=`<div class="cat-block"><div class="cat-label" style="color:${cfg.color}"><i class="fas ${cfg.icon}"></i>${cfg.label}<span class="badge">${catLinks.length}</span></div><div class="grid">`;
    catLinks.forEach(l=>{
      const domain=getDomain(l.url);
      const color=l.icon_color||cfg.color;
      const bgColor=hexToRgba(color,0.12);
      const icon=l.icon||('fas '+cfg.icon);
      const tags=(l.tags||[]).slice(0,3).map(t=>`<span class="tag">${esc(t)}</span>`).join('');
      html+=`<a class="lcard" href="${esc(l.url)}" target="_blank" rel="noopener">
        <div class="icon-box" style="background:${bgColor};color:${color}"><i class="${esc(icon)}"></i></div>
        <div class="lcard-info">
          <div class="lcard-title">${esc(l.title)}</div>
          <div class="lcard-url">${esc(domain)}</div>
          ${tags?`<div class="lcard-tags">${tags}</div>`:''}
        </div>
        <i class="fas fa-arrow-up-right-from-square lcard-ext"></i>
      </a>`;
    });
    html+='</div></div>';
  });
  out.innerHTML=html;
}

document.getElementById('searchInput').addEventListener('input',e=>{search=e.target.value.trim();render()});
document.addEventListener('keydown',e=>{if((e.ctrlKey||e.metaKey)&&e.key==='k'){e.preventDefault();document.getElementById('searchInput').focus()}});
window.setFilter=setFilter;
init();
</script>
</body>
</html>
